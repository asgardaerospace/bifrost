services:
  postgres:
    image: postgres:16-alpine
    container_name: bifrost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bifrost
    ports:
      - "5432:5432"
    volumes:
      - bifrost_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bifrost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bifrost_pg_data:
    name: bifrost_pg_data
